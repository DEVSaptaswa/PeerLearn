# ═══════════════════════════════════════════════════════════════════════════════
# PeerLearn — docker-compose.yml
#
# Services:
#   nginx   → Reverse proxy (port 80). Serves static/media files directly.
#   web     → Django + Gunicorn (port 8000, internal only)
#   mysql   → MySQL 8.0 (port 3306, internal only)
#   mongo   → MongoDB 7 (port 27017, internal only)
#   redis   → Redis 7 (port 6379, internal only)
#
# Usage:
#   docker compose up --build -d       # first run
#   docker compose up -d               # subsequent runs
#   docker compose down -v             # destroy everything including volumes
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Nginx — reverse proxy & static file server ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: peerlearn_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_vol:/app/staticfiles:ro
      - media_vol:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - peerlearn_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Web — Django + Gunicorn ─────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: peerlearn_web
    # Use on-failure so a config crash is obvious; won't loop-restart indefinitely
    restart: on-failure
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MONGO_HOST: mongo
      REDIS_HOST: redis
      SEED_DATA: "${SEED_DATA:-true}"
    volumes:
      - static_vol:/app/staticfiles
      - media_vol:/app/media
      # Source bind-mounts for dev convenience (hot template/static changes).
      # Safe in production too — read-only for Django.
      - ./apps:/app/apps
      - ./templates:/app/templates
      - ./static:/app/static
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - peerlearn_net
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/accounts/login/"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s          # enough time for migrations + collectstatic
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── MySQL 8.0 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: peerlearn_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootpassword}"
      MYSQL_DATABASE: "${MYSQL_DB:-peer_learning}"
      MYSQL_USER: "${MYSQL_USER:-peerlearn}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-peerpassword}"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - peerlearn_net
    expose:
      - "3306"
    healthcheck:
      # Use root credentials for the health probe so it works before the
      # app user is fully provisioned
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "localhost"
        - "-uroot"
        - "--password=${MYSQL_ROOT_PASSWORD:-rootpassword}"
        - "--silent"
      interval: 10s
      timeout: 5s
      retries: 12           # up to 120 s on first boot
      start_period: 40s     # give InnoDB time to initialise data dir
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── MongoDB 7 ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: peerlearn_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_ROOT_USER:-admin}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD:-mongopassword}"
      MONGO_INITDB_DATABASE: "${MONGO_DB:-peer_learning}"
      MONGO_APP_PASSWORD: "${MONGO_APP_PASSWORD:-mongoapppwd}"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - peerlearn_net
    expose:
      - "27017"
    healthcheck:
      test:
        - "CMD"
        - "mongosh"
        - "--quiet"
        - "--eval"
        - "db.adminCommand('ping').ok"
        - "--username"
        - "${MONGO_ROOT_USER:-admin}"
        - "--password"
        - "${MONGO_ROOT_PASSWORD:-mongopassword}"
        - "--authenticationDatabase"
        - "admin"
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: peerlearn_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-redispassword}"
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redis_data:/data
    networks:
      - peerlearn_net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
  static_vol:
    driver: local
  media_vol:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  peerlearn_net:
    driver: bridge
    name: peerlearn_network
