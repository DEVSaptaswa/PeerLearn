# ═══════════════════════════════════════════════════════════════════════════════
# PeerLearn — Nginx Configuration
# Responsibilities:
#   · Terminate HTTP (add HTTPS via Certbot in production)
#   · Serve /static/ and /media/ directly from volume (bypasses Django)
#   · Proxy all other requests to Gunicorn on web:8000
#   · Security headers, gzip compression, client body size limit
# ═══════════════════════════════════════════════════════════════════════════════

upstream peerlearn_app {
    server web:8000;
    keepalive 32;
}

# ── Gzip compression ─────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml
    font/woff2;

server {
    listen 80;
    server_name _;        # Matches any hostname; replace with your domain in prod
    charset utf-8;

    # Max upload size (avatar images, file attachments)
    client_max_body_size 10M;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-Frame-Options          "SAMEORIGIN"      always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "strict-origin"   always;

    # ── Static files — served by Nginx directly ───────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        # Gzip static assets
        gzip_static on;
    }

    # ── Media (user uploads) — served by Nginx directly ──────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Health check endpoint (used by load balancers / monitoring) ──────────
    location = /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── All other requests → Gunicorn ─────────────────────────────────────────
    location / {
        proxy_pass         http://peerlearn_app;
        proxy_http_version 1.1;

        # Headers forwarded to Django
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Buffer tuning
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;
    }

    # ── Error pages ───────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
